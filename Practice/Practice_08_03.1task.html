<!DOCTYPE html>
<html lang="uk">
<head>
    <style>
        .overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.5);
        }
        .modal {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            background: white;
            padding: 20px;
            width: 300px;
            border-radius: 8px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }
    </style>
</head>
<body>
    <div class="overlay">
        <div class="modal">
            <h2>MODAL WINDOW</h2>
            <p>Текст модального вікна.</p>
        </div>
    </div>
</body>
</html>
