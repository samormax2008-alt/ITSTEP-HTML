<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Магазин</title>
    <style>
        body { font-family: sans-serif; background-color: #f9f9f9; padding: 20px; }

        .catalog {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            justify-content: center;
        }

        .product-card {
            border: 1px solid #ccc;
            background-color: white;
            width: 250px;
            padding: 15px;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .product-image {
            width: 200px;
            height: 200px;
            background-color: #eee;
            margin-bottom: 15px;
        }

        .product-name { font-weight: bold; margin-bottom: 5px; }
        .product-desc { font-size: 14px; color: #555; margin-bottom: 10px; }
        .product-price { color: red; font-weight: bold; margin-bottom: 15px; }

        .buy-btn {
            background-color: #002244;
            color: white;
            border: none;
            padding: 8px 16px;
            cursor: pointer;
        }
    </style>
</head>
<body>

<div class="catalog">
    <div class="product-card">
        <div class="product-image"></div> <div class="product-name">Пустота</div>
        <div class="product-desc">Просто пустота</div>
        <div class="product-price">23500 грн</div>
        <button class="buy-btn">Купити</button>
    </div>

    <div class="product-card">
        <div class="product-image"></div>
        <div class="product-name">Повітря</div>
        <div class="product-desc">А що тут повинно бути?</div>
        <div class="product-price">10000 грн</div>
        <button class="buy-btn">Купити</button>
    </div>
</div>

</body>
</html>
