<!DOCTYPE html>
<html lang="uk">
<head>
    <style>
        ul { list-style: none; padding: 0; margin: 0; }
        .menu { display: flex; background: #2e7d32; width: fit-content; }
        .menu > li { padding: 15px 25px; color: white; position: relative; cursor: pointer; }
        .menu > li:hover { background: #1b5e20; }

        .submenu { display: none; position: absolute; top: 100%; left: 0; background: #388e3c; min-width: 150px; }
        .submenu li { padding: 10px; }
        
        .dropdown:hover .submenu { display: block; }
        
        .dropdown-deep { position: relative; }
        .submenu-deep { display: none; position: absolute; top: 0; left: 100%; background: #2e7d32; min-width: 150px; }
        .dropdown-deep:hover .submenu-deep { display: block; }
    </style>
</head>
<body>

<ul class="menu">
    <li>Домашня</li>
    <li class="dropdown">Категорії
        <ul class="submenu">
            <li>Чоловіки</li>
            <li>Жінки</li>
                <ul class="submenu-deep">
                    <li>Плаття</li>
                    <li>Штани</li>
                </ul>
            </li>
            <li>Діти</li>
        </ul>
    </li>
    <li>Про нас</li>
    <li>Контакти</li>
</ul>

</body>
</html>
