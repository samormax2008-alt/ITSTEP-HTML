<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Список фруктів</title>
    <link rel="stylesheet" href="style.css">
<style>
    body {
    background: #ffffff;
    font-family: Arial, sans-serif;
}

.box {
    width: 400px;
    background: #f3b7c5;
    padding: 20px;
    margin: 30px auto;
}

ol {
    margin: 0;
    padding-left: 40px;
}

li {
    background: #d76b87;
    color: white;
    margin: 10px 0;
    padding: 10px;
}

span {
    background: #b54262;
    padding: 10px 20px;
}
</style>
</head>
<body>

<div class="box">
    <ol>
        <li><span>Яблуко</span></li>
        <li><span>Мандарин</span></li>
        <li><span>Ананас</span></li>
        <li><span>Груша</span></li>
        <li><span>Вишня</span></li>
    </ol>
</div>

</body>
</html>
