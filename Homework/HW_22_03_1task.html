<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Адаптивний дизайн</title>
    <link rel="stylesheet" href="task1_22_03.css">

<body>

    <div class="card">

        <div class="meta-container">
            <div class="avatar">
                <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
                    <circle cx="50" cy="50" r="50" fill="#e0e0e0"/>
                    <circle cx="50" cy="40" r="20" fill="#ffffff"/>
                    <path d="M20 85 C20 65, 80 65, 80 85" fill="#fbc02d"/>

            <div class="meta-info">
                <div class="meta-item author">
                    <span class="label">Автор</span>
                    <span class="value">Geoff Graham</span>
                </div>
                <div class="meta-item comments">
                    <span class="label">49 коментарів</span>
                    <span class="value link">До коментарів</span>
                </div>
                <div class="meta-item published">
                    <span class="label">Опубліковано</span>
                    <span class="value">Лис 11, 2018</span>
                </div>
                <div class="meta-item updated">
                    <span class="label">Оновлено</span>
                    <span class="value">Лис 17, 2018</span>
                </div>
            </div>
        </div>
