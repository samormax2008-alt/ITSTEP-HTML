<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ДОШКА ОГОЛОШЕНЬ - Авторизація/реєстрація</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    
    <style>
        body {
            background-color: #f8f9fa;
        }
        .auth-container {
            max-width: 400px;
            margin-top: 80px;
        }
        .nav-tabs .nav-link {
            color: #6c757d;
            border: none;
            font-weight: 500;
            padding: 10px 20px;
        }
        .nav-tabs .nav-link.active {
            color: #000000 !important;
            font-weight: bold;
            border: none;
            border-bottom: 3px solid #ffc107;
            background-color: transparent;
        }
        .nav-tabs .nav-link:hover {
            border-color: transparent;
            color: #000;
        }
    </style>
</head>
<body>

    <div class="text-center mt-5">
        <a href="#" class="text-dark text-decoration-none d-inline-flex align-items-center">
            <i class="bi bi-megaphone fs-2 me-2 border border-2 border-dark p-1 rounded"></i>
            <span class="fs-4 fw-bold">ДОШКА ОГОЛОШЕНЬ</span>
        </a>
    </div>

    <div class="container auth-container bg-white p-4 shadow-sm rounded border">
        
        <ul class="nav nav-tabs justify-content-center mb-4" id="authTabs" role="tablist">
            <li class="nav-item" role="presentation">
                <button class="nav-link active" id="signin-tab" data-bs-toggle="tab" data-bs-target="#signin-pane" type="button" role="tab" aria-controls="signin-pane" aria-selected="true">Авторизуватися</button>
            </li>
            <li class="nav-item" role="presentation">
                <button class="nav-link" id="signup-tab" data-bs-toggle="tab" data-bs-target="#signup-pane" type="button" role="tab" aria-controls="signup-pane" aria-selected="false">Зареєструватися</button>
            </li>
        </ul>

        <div class="tab-content" id="authTabsContent">
            
            <div class="tab-pane fade show active" id="signin-pane" role="tabpanel" aria-labelledby="signin-tab" tabindex="0">
                <form>
                    <div class="mb-3">
                        <label for="signInEmail" class="form-label text-muted small">E-mail</label>
                        <input type="email" class="form-control form-control-lg fs-6" id="signInEmail" placeholder="example@mail.com" required>
                    </div>
                    
                    <div class="mb-3">
                        <div class="d-flex justify-content-between">
                            <label for="signInPassword" class="form-label text-muted small">Пароль</label>
                            <a href="#" class="text-primary small text-decoration-underline">Забули пароль?</a>
                        </div>
                        <input type="password" class="form-control form-control-lg fs-6" id="signInPassword" placeholder="••••••••" required>
                    </div>
                    
                    <button type="submit" class="btn btn-warning w-100 fw-bold py-2 mt-2 text-dark">Авторизуватися</button>
                </form>
            </div>

            <div class="tab-pane fade" id="signup-pane" role="tabpanel" aria-labelledby="signup-tab" tabindex="0">
                <form>
                    <div class="mb-3">
                        <label for="signUpName" class="form-label text-muted small">Повне ім'я</label>
                        <input type="text" class="form-control form-control-lg fs-6" id="signUpName" placeholder="John Doe" required>
                    </div>

                    <div class="mb-3">
                        <label for="signUpEmail" class="form-label text-muted small">E-mail</label>
                        <input type="email" class="form-control form-control-lg fs-6" id="signUpEmail" placeholder="example@mail.com" required>
                    </div>
                    
                    <div class="mb-3">
                        <label for="signUpPassword" class="form-label text-muted small">Пароль</label>
                        <input type="password" class="form-control form-control-lg fs-6" id="signUpPassword" placeholder="Створіть пароль" required>
                    </div>

                    <div class="mb-4">
                        <label for="signUpConfirmPassword" class="form-label text-muted small">Підтвердити пароль</label>
                        <input type="password" class="form-control form-control-lg fs-6" id="signUpConfirmPassword" placeholder="Повторіть пароль" required>
                    </div>
                    
                    <button type="submit" class="btn btn-warning w-100 fw-bold py-2 text-dark">Реєстрація</button>
                </form>
            </div>

        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
