<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Продукти в холодильнику</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            background-color: #fdfdfd;
            margin: 0;
            padding: 20px;
        }

        h1 {
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 30px;
        }

        .products-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 15px;
            max-width: 950px;
            margin: 0 auto;
        }

        .product-card {
            width: 160px;
            height: 160px;
            border: 2px solid #e0e0e0;
            border-radius: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background-color: #ffffff;
            box-sizing: border-box;
        }

        .product-card img {
            width: 70px;
            height: 70px;
            object-fit: contain;
            margin-bottom: 10px;
        }

        .product-card p {
            margin: 0;
            font-size: 13px;
            font-weight: bold;
            color: #333;
        }

        .footer-text {
            margin-top: 40px;
            font-size: 12px;
            font-weight: bold;
            color: #555;
        }
    </style>
</head>
<body>

    <h1>Що я маю в своєму холодильнику?</h1>
