<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Компонент прев'ю NFT-картки</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap');
        body {
            font-family: 'Outfit', sans-serif;
        }
    </style>
</head>
<body class="bg-[#0d192b] min-h-screen flex items-center justify-center p-6">

    <div class="bg-[#14253d] max-w-[350px] w-full p-6 rounded-2xl shadow-[0_25px_50px_-12px_rgba(0,0,0,0.5)] flex flex-col group">
        
        <div class="relative rounded-xl overflow-hidden cursor-pointer aspect-square bg-[#00fff7]">
            <img src="https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?auto=format&fit=crop&w=400&q=80" 
                 alt="Equilibrium Cube" 
                 class="w-full h-full object-cover transition-opacity duration-300 group-hover:opacity-50">
            
            <div class="absolute inset-0 bg-[#00fff7]/50 opacity-0 transition-opacity duration-300 flex items-center justify-center group-hover:opacity-100">
                <svg width="48" height="48" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="white" stroke-width="2">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                    <path stroke-linecap="round" stroke-linejoin="round" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
                </svg>
            </div>
        </div>

        <h1 class="text-white font-semibold text-2xl mt-6 cursor-pointer transition-colors duration-300 hover:text-[#00fff7]">
            Equilibrium #3429
        </h1>
        
        <p class="text-[#8bacd9] font-light text-[16px] mt-4 leading-relaxed">
            Our Equilibrium collection promotes balance and calm.
        </p>

        <div class="flex justify-between items-center mt-6">
            <div class="flex items-center gap-2 text-[#00fff7] font-semibold text-[15px]">
                <svg width="11" height="18" xmlns="http://www.w3.org/2000/svg">
                    <path d="M11 10.216l-5.5 3.18-5.5-3.18 5.5-7.758z" fill="#00FFF8"/>
                    <path d="M11 11.208L5.5 14.43.0 11.208 5.5 18z" fill="#00FFF8"/>
                </svg>
                0.041 ETH
            </div>
            
            <div class="flex items-center gap-2 text-[#8bacd9] font-normal text-[15px]">
                <svg width="17" height="17" xmlns="http://www.w3.org/2000/svg">
                    <path d="M8.305 0a8.305 8.305 0 100 16.61 8.305 8.305 0 000-16.61zm0 14.948a6.643 6.643 0 110-13.285 6.643 6.643 0 010 13.285z" fill="#8BACD9"/>
                    <path d="M11.62 10.51l-3.315-1.99V4.152a.83.83 0 10-1.66 0v4.746c0 .285.145.548.39.7l3.73 2.24a.823.823 0 001.077-.282.83.83 0 00-.222-1.046z" fill="#8BACD9"/>
                </svg>
                Залишилось 3 дні
            </div>
        </div>

        <hr class="border-[#2e405a] my-4 mt-5">

        <div class="flex items-center gap-4 py-1">
            <img src="https://images.unsplash.com/photo-1534528741775-53994a69daeb?auto=format&fit=crop&w=100&q=80" 
                 alt="Jules Wyvern Avatar" 
                 class="w-8 h-8 rounded-full border border-white object-cover">
            
            <p class="text-[#8bacd9] text-[15px]">
                Створено користувачем:
                <span class="text-white cursor-pointer transition-colors duration-300 hover:text-[#00fff7]">
                    Jules Wyvern
                </span>
            </p>
        </div>

    </div>

</body>
</html>
