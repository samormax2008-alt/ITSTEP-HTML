<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вертикальне меню</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f5f5f5;
            padding: 40px;
        }

        .vertical-menu {
            width: 280px;
            background-color: #757575;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .menu-item {
            display: flex;
            align-items: center;
            padding: 20px 25px;
            color: #ffffff;
            text-decoration: none;
            font-size: 14px;
            font-weight: bold;
            letter-spacing: 1px;
            transition: background-color 0.2s ease;
        }

        .menu-icon {
            font-size: 18px;
            margin-right: 25px;
            width: 24px;
        }

        .menu-item:hover {
            background-color: #4a4a4a;
        }
    </style>
</head>
<body>

    <div class="vertical-menu">
        <a href="#" class="menu-item">
            <span class="menu-icon">✏️</span> РЕДАГУВАННЯ
        </a>
        <a href="#" class="menu-item">
            <span class="menu-icon">❤️</span> УЛЮБЛЕНІ
        </a>
        <a href="#" class="menu-item">
            <span class="menu-icon">🕒</span> ІСТОРІЯ
        </a>
        <a href="#" class="menu-item active">
            <span class="menu-icon">🛡️</span> БЕЗПЕКА
        </a>
        <a href="#" class="menu-item">
            <span class="menu-icon">⚙️</span> НАСТРОЙКИ
        </a>
    </div>

</body>
</html>
